<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增速模块 - Stock Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="chart.umd.min.js"></script>
    <style>
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #71767b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #1d9bf0; }

        .growth-card {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .growth-card h3 {
            margin-bottom: 4px;
            color: #e7e9ea;
        }
        .growth-card .subtitle {
            color: #71767b;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .chart-wrapper {
            position: relative;
            height: 260px;
            margin-bottom: 20px;
        }
        .growth-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .growth-table th {
            text-align: center;
            padding: 7px 12px;
            color: #8899a6;
            border-bottom: 2px solid #333;
            background: #12171d;
        }
        .growth-table td {
            text-align: center;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2732;
        }
        .growth-table td.year-col {
            font-weight: 700;
            color: #1d9bf0;
        }
        .error-card {
            background: #1a1f25;
            border: 1px solid #f4212e33;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            color: #f4212e;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回主页</a>
        <header>
            <h1>📈 增速模块</h1>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="tickerInput" placeholder="输入美股代码，逗号分隔 (如: AAPL, MSFT, NVDA)" />
                <button id="fetchBtn" onclick="fetchGrowth()">查询</button>
            </div>
            <div id="statusMsg" class="status-msg"></div>
        </section>

        <section class="data-section">
            <div id="loading" class="loading hidden">⏳ 正在查询收入数据...</div>
            <div id="results"></div>
        </section>
    </div>

    <script src="growth.js"></script>
</body>
</html>
