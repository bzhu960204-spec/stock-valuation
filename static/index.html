<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Valuation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="/" style="display:inline-block;margin-bottom:16px;color:#71767b;text-decoration:none;font-size:0.9rem;transition:color 0.2s;" onmouseover="this.style.color='#1d9bf0'" onmouseout="this.style.color='#71767b'">← 返回主页</a>
        <header>
            <h1>📊 Stock Valuation</h1>
        </header>

        <div class="market-tabs">
            <button class="tab-btn active" id="tab-global" onclick="switchMarket('global')">🌏 全球 / 美股</button>
            <button class="tab-btn" id="tab-cn" onclick="switchMarket('cn')">🇨🇳 A股</button>
        </div>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="tickerInput" placeholder="输入股票代码，逗号分隔 (如: AAPL, MSFT, NVDA)" />
                <button id="fetchBtn" onclick="fetchStocks()">拉取数据</button>
            </div>
            <div id="statusMsg" class="status-msg"></div>
        </section>

        <section class="data-section">
            <div id="loading" class="loading hidden">⏳ 正在拉取数据...</div>
            <div id="tableContainer"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
