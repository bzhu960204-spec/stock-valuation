<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财报日历 - Stock Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #71767b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #1d9bf0; }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .header-row h1 { margin: 0; }

        .last-updated {
            color: #71767b;
            font-size: 0.82rem;
            margin-bottom: 24px;
        }

        /* Progress bar */
        .progress-box {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: none;
        }
        .progress-box.active { display: block; }
        .progress-label {
            font-size: 0.9rem;
            color: #e7e9ea;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .progress-label .pct { color: #1d9bf0; font-weight: 700; }
        .progress-track {
            height: 8px;
            background: #2e3a47;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #1d9bf0;
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .progress-sub {
            font-size: 0.78rem;
            color: #71767b;
        }

        /* Month Navigation */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .month-nav button {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            color: #e7e9ea;
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .month-nav button:hover { border-color: #1d9bf0; }
        .month-nav button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .month-nav .month-label {
            font-size: 1.2rem;
            font-weight: 700;
            min-width: 160px;
            text-align: center;
        }
        .fetch-btn {
            background: #1d9bf0 !important;
            border-color: #1d9bf0 !important;
            color: #fff !important;
        }
        .fetch-btn:hover { background: #1a8cd8 !important; }
        .month-status {
            text-align: center;
            font-size: 0.78rem;
            color: #71767b;
            margin-bottom: 16px;
            min-height: 18px;
        }
        .month-status .fetched { color: #00b874; }
        .month-status .not-fetched { color: #f7b731; }

        /* Sector Filter */
        .sector-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            min-height: 32px;
        }
        .sector-filter-label {
            font-size: 0.8rem;
            color: #71767b;
            margin-right: 4px;
        }
        .sector-pill {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 14px;
            border: 1px solid #2e3a47;
            background: #1a1f25;
            color: #8899a6;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .sector-pill:hover {
            border-color: #0ea5e9;
            color: #67c7eb;
        }
        .sector-pill.active {
            background: #0ea5e922;
            border-color: #0ea5e9;
            color: #67c7eb;
            font-weight: 600;
        }
        .sector-pill.all-pill.active {
            background: #1d9bf022;
            border-color: #1d9bf0;
            color: #1d9bf0;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 32px;
        }
        .calendar-grid .weekday-header {
            text-align: center;
            font-size: 0.8rem;
            color: #71767b;
            padding: 8px 0;
            font-weight: 600;
        }
        .calendar-cell {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 6px;
            min-height: 90px;
            padding: 6px 8px;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }
        .calendar-cell.empty {
            background: #12151a;
            border-color: transparent;
        }
        .calendar-cell.has-earnings {
            cursor: pointer;
        }
        .calendar-cell.has-earnings:hover {
            border-color: #1d9bf0;
            background: #1e2530;
        }
        .calendar-cell.today {
            border-color: #f7b731;
        }
        .calendar-cell.selected {
            border-color: #1d9bf0;
            background: #1d9bf015;
            box-shadow: 0 0 12px rgba(29, 155, 240, 0.15);
        }
        .calendar-cell .day-num {
            font-size: 0.82rem;
            font-weight: 600;
            color: #8899a6;
            margin-bottom: 4px;
        }
        .calendar-cell.today .day-num {
            color: #f7b731;
        }
        .calendar-cell.weekend {
            opacity: 0.4;
        }
        .calendar-cell .cell-tickers {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }
        .calendar-cell .cell-ticker {
            font-size: 0.68rem;
            background: #1d9bf018;
            color: #1d9bf0;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }
        .calendar-cell .cell-more {
            font-size: 0.65rem;
            color: #71767b;
            margin-top: 2px;
        }
        .calendar-cell .cell-count {
            position: absolute;
            top: 5px;
            right: 7px;
            font-size: 0.65rem;
            background: #1d9bf0;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Detail Panel */
        .detail-panel {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 12px;
            padding: 24px;
            margin-top: 8px;
            display: none;
        }
        .detail-panel.active { display: block; }
        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .detail-header h3 {
            color: #1d9bf0;
            font-size: 1.1rem;
            margin: 0;
        }
        .detail-close {
            background: none;
            border: none;
            color: #71767b;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .detail-close:hover { color: #e7e9ea; }

        .detail-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .detail-item {
            background: #12171d;
            border: 1px solid #2e3a47;
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .detail-item .ticker {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1d9bf0;
            min-width: 65px;
        }
        .detail-item .info {
            flex: 1;
            min-width: 0;
        }
        .detail-item .name {
            font-size: 0.9rem;
            color: #e7e9ea;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .detail-item .meta {
            font-size: 0.8rem;
            color: #71767b;
            margin-top: 3px;
        }
        .detail-item .badges {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Badges */
        .badge {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-pre {
            background: #00b87422;
            color: #00b874;
            border: 1px solid #00b87444;
        }
        .badge-post {
            background: #f4212e22;
            color: #f4212e;
            border: 1px solid #f4212e44;
        }
        .badge-tbd {
            background: #71767b22;
            color: #71767b;
            border: 1px solid #71767b44;
        }
        .badge-sector {
            background: #0ea5e922;
            color: #67c7eb;
            border: 1px solid #0ea5e944;
        }
        .badge-sp500 {
            background: #7c3aed22;
            color: #a78bfa;
            border: 1px solid #7c3aed44;
        }
        .badge-est {
            background: #f7b73122;
            color: #f7b731;
            border: 1px solid #f7b73144;
        }
        .badge-beat {
            background: #00b87422;
            color: #00b874;
            border: 1px solid #00b87444;
        }
        .badge-miss {
            background: #f4212e22;
            color: #f4212e;
            border: 1px solid #f4212e44;
        }
        .badge-reported {
            background: #71767b22;
            color: #a0a8b0;
            border: 1px solid #71767b44;
        }

        /* Loading */
        .loading-box {
            text-align: center;
            padding: 60px 20px;
            color: #71767b;
            font-size: 1rem;
        }
        .loading-box .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #2e3a47;
            border-top-color: #1d9bf0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Note button */
        .note-btn {
            background: none;
            border: 1px solid #2e3a47;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: border-color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .note-btn:hover {
            border-color: #1d9bf0;
            background: #1d9bf015;
        }

        /* Note Modal */
        .note-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .note-modal.active {
            display: flex;
        }
        .note-modal-content {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .note-modal-content.maximized {
            width: 100% !important;
            max-width: 100% !important;
            max-height: 100vh !important;
            height: 100vh;
            border-radius: 0;
            border: none;
        }
        .note-modal.maximized {
            align-items: stretch;
            padding: 0;
        }
        .maximize-btn {
            background: none;
            border: none;
            color: #71767b;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        .maximize-btn:hover { color: #e7e9ea; }
        .note-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #2e3a47;
        }
        .note-modal-header h3 {
            margin: 0;
            color: #1d9bf0;
            font-size: 1rem;
        }
        .note-modal-header .close-btn {
            background: none;
            border: none;
            color: #71767b;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .note-modal-header .close-btn:hover { color: #e7e9ea; }

        .note-modal-toolbar {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            border-bottom: 1px solid #2e3a47;
        }
        .note-modal-toolbar button {
            background: #12171d;
            border: 1px solid #2e3a47;
            color: #e7e9ea;
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: border-color 0.2s;
        }
        .note-modal-toolbar button:hover { border-color: #1d9bf0; }
        .note-modal-toolbar .save-btn {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: #fff;
            font-weight: 600;
        }
        .note-modal-toolbar .save-btn:hover { background: #1a8cd8; }

        .note-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            min-height: 300px;
        }
        .note-modal-body textarea {
            width: 100%;
            height: 100%;
            min-height: 280px;
            background: #12171d;
            border: 1px solid #2e3a47;
            border-radius: 8px;
            color: #e7e9ea;
            padding: 14px;
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
        }
        .note-modal-body textarea:focus {
            outline: none;
            border-color: #1d9bf0;
        }
        .note-preview {
            color: #e7e9ea;
            line-height: 1.7;
            font-size: 0.9rem;
        }
        .note-preview h1 { font-size: 1.4rem; color: #e7e9ea; margin: 16px 0 8px; border-bottom: 1px solid #2e3a47; padding-bottom: 6px; }
        .note-preview h2 { font-size: 1.2rem; color: #e7e9ea; margin: 14px 0 6px; }
        .note-preview h3 { font-size: 1.05rem; color: #e7e9ea; margin: 12px 0 4px; }
        .note-preview h4 { font-size: 0.95rem; color: #b0b8c0; margin: 10px 0 4px; }
        .note-preview strong { color: #fff; }
        .note-preview code {
            background: #2e3a47;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
        }
        .note-preview pre {
            background: #12171d;
            border: 1px solid #2e3a47;
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
        }
        .note-preview pre code {
            background: none;
            padding: 0;
        }
        .note-preview blockquote {
            border-left: 3px solid #1d9bf0;
            padding-left: 12px;
            color: #8899a6;
            margin: 10px 0;
        }
        .note-preview ul { padding-left: 20px; }
        .note-preview li { margin: 4px 0; }
        .note-preview hr { border: none; border-top: 1px solid #2e3a47; margin: 16px 0; }
        .note-preview a { color: #1d9bf0; text-decoration: none; }
        .note-preview a:hover { text-decoration: underline; }
        .note-preview del { color: #71767b; }
        .note-preview table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9rem; }
        .note-preview th, .note-preview td { border: 1px solid #2e3a47; padding: 6px 12px; text-align: left; }
        .note-preview th { background: #1a1f25; color: #1d9bf0; font-weight: 600; }
        .note-preview tr:nth-child(even) td { background: #1a1f25; }
        .note-preview td { color: #e7e9ea; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1d9bf0;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 2000;
        }
        .toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.error { background: #f4212e; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回主页</a>
        <div class="header-row">
            <h1>📅 财报日历</h1>
        </div>
        <div class="last-updated" id="lastUpdated"></div>

        <div id="loading" class="loading-box">
            <div class="spinner"></div>
            <div>正在加载财报日历...</div>
        </div>

        <div id="content" style="display:none;">
            <!-- 进度条（拉取时显示） -->
            <div class="progress-box" id="progressBox">
                <div class="progress-label">
                    <span id="progressText">准备中...</span>
                    <span class="pct" id="progressPct">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-sub" id="progressSub"></div>
            </div>
            <div class="month-nav">
                <button onclick="prevMonth()">◀ 上月</button>
                <span class="month-label" id="monthLabel"></span>
                <button onclick="nextMonth()">下月 ▶</button>
                <button class="fetch-btn" id="fetchMonthBtn" onclick="fetchCurrentMonth()">⬇ 拉取本月数据</button>
            </div>
            <div class="month-status" id="monthStatus"></div>
            <div class="sector-filter" id="sectorFilter"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <h3 id="detailTitle"></h3>
                    <button class="detail-close" onclick="closeDetail()">✕</button>
                </div>
                <div class="detail-list" id="detailList"></div>
            </div>
        </div>
    </div>

    <script src="earnings.js"></script>

    <!-- 笔记弹窗 -->
    <div class="note-modal" id="noteModal">
        <div class="note-modal-content">
            <div class="note-modal-header">
                <h3 id="noteModalTitle">财报笔记</h3>
                <div style="display:flex;align-items:center;gap:4px;">
                    <button class="maximize-btn" id="noteMaximizeBtn" onclick="toggleNoteMaximize()" title="最大化">⛶</button>
                    <button class="close-btn" onclick="closeNoteModal()">✕</button>
                </div>
            </div>
            <div class="note-modal-toolbar">
                <button id="noteToggleBtn" data-mode="edit" onclick="toggleNotePreview()">预览</button>
                <button class="save-btn" onclick="saveNote()">保存</button>
            </div>
            <div class="note-modal-body">
                <textarea id="noteEditor" placeholder="在此输入 Markdown 格式的笔记...&#10;&#10;支持: # 标题, **粗体**, *斜体*, - 列表, > 引用, `代码`, ```代码块```"></textarea>
                <div class="note-preview" id="notePreview" style="display:none;"></div>
            </div>
        </div>
    </div>
</body>
</html>
