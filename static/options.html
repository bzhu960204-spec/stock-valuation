<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期权链 - Stock Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="chart.umd.min.js"></script>
    <style>
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #71767b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #1d9bf0; }

        .exp-select {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .exp-select label {
            color: #8899a6;
            font-size: 0.9rem;
        }
        .exp-select select {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 8px;
            color: #e7e9ea;
            padding: 8px 14px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .exp-select select:focus {
            outline: none;
            border-color: #1d9bf0;
        }

        .options-card {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 12px;
            padding: 24px;
            margin-top: 20px;
        }
        .options-card h3 {
            margin-bottom: 4px;
            color: #e7e9ea;
        }
        .options-card .subtitle {
            color: #71767b;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .chart-wrapper {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }
        .legend-info {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #8899a6;
        }
        .legend-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-info .dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .dot-call { background: #00ba7c; }
        .dot-put { background: #f4212e; }

        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        .tab-bar button {
            background: #1a1f25;
            border: 1px solid #2e3a47;
            border-radius: 8px;
            color: #8899a6;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tab-bar button.active {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: #fff;
        }
        .tab-bar button:hover:not(.active) {
            border-color: #1d9bf0;
            color: #e7e9ea;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回主页</a>
        <header>
            <h1>📋 期权链</h1>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="tickerInput" placeholder="输入美股代码 (如: AAPL)" />
                <button id="fetchBtn" onclick="fetchOptions()">查询</button>
            </div>
            <div id="statusMsg" class="status-msg"></div>
            <div class="exp-select hidden" id="expSection">
                <label>行权日期:</label>
                <select id="expSelect" onchange="onExpirationChange()"></select>
            </div>
        </section>

        <section class="data-section">
            <div id="loading" class="loading hidden">⏳ 正在查询期权数据...</div>
            <div id="results"></div>
        </section>
    </div>

    <script src="options.js"></script>
</body>
</html>
